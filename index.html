<script>
const URL="https://script.google.com/macros/s/AKfycbx3rIDGkkPMF4jyLq55A2A7nnZ6VL5Lm7wccG7kqbBDkE1WwTyDrBxxU-123CN9-QILMA/exec";

function formatDate(iso){
    const d = new Date(iso);
    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = String(d.getFullYear());
    return `${day}-${month}-${year}`;
}

function formatTime(timeString){
    const t = new Date(timeString);
    const hours = String(t.getHours()).padStart(2,'0');
    const minutes = String(t.getMinutes()).padStart(2,'0');
    return `${hours}:${minutes}`;
}

fetch(URL)
.then(r=>r.json())
.then(data=>{
    document.getElementById("ngoLoading").style.display="none";

    const grouped={};
    data.FREE.forEach(row=>{
        if(!row.Date) return;
        if(!grouped[row.Date]) grouped[row.Date]=[];
        grouped[row.Date].push(row);
    });

    const container=document.getElementById("content");
    Object.keys(grouped).reverse().forEach((date,i)=>{
        const d=document.createElement("div");
        d.className="date";
        d.textContent=formatDate(date);
        d.onclick=()=>{const m=document.getElementById("m"+i); m.style.display=m.style.display==="block"?"none":"block";};

        const matches=document.createElement("div");
        matches.className="matches";
        matches.id="m"+i;

        grouped[date].forEach(r=>{
            const div=document.createElement("div");
            let statusClass=r.Status==="WON"?"won":r.Status==="LOST"?"lost":"pending";
            div.className="match "+statusClass;
            div.innerHTML=`${formatTime(r.Time)} ${r.Home} vs ${r.Away}<br>Pick: ${r.Pick}<br>Status: ${r.Status}`;

            if(r.Highlight){
                const h=document.createElement("div");
                h.className="highlight-link";
                h.innerHTML="⏯ MATCH HIGHLIGHT";
                h.onclick=()=>openHighlight(r.Highlight);
                div.appendChild(h);
            }

            matches.appendChild(div);
        });

        container.appendChild(d);
        container.appendChild(matches);
    });
});

function openHighlight(url){
    let id="";
    if(url.includes("youtu.be/")) id=url.split("youtu.be/")[1].split(/[?&]/)[0];
    else if(url.includes("shorts/")) id=url.split("shorts/")[1].split(/[?&]/)[0];
    else if(url.includes("watch?v=")) id=url.split("v=")[1].split("&")[0];
    else if(url.includes("embed/")) id=url.split("embed/")[1].split(/[?&]/)[0];
    document.getElementById("videoFrame").src="https://www.youtube.com/embed/"+id+"?autoplay=1";
    document.getElementById("videoPopup").style.display="block";
}
function closeVideo(){
    document.getElementById("videoFrame").src="";
    document.getElementById("videoPopup").style.display="none";
}

/* DRAG VIDEO */
let dragItem=document.getElementById("videoPopupContent");
let active=false,currentX,currentY,initialX,initialY,xOffset=0,yOffset=0;
dragItem.addEventListener("touchstart",dragStart);
dragItem.addEventListener("touchend",dragEnd);
dragItem.addEventListener("touchmove",drag);
dragItem.addEventListener("mousedown",dragStart);
dragItem.addEventListener("mouseup",dragEnd);
dragItem.addEventListener("mousemove",drag);

function dragStart(e){
    initialX=(e.touches?e.touches[0].clientX:e.clientX)-xOffset;
    initialY=(e.touches?e.touches[0].clientY:e.clientY)-yOffset;
    active=true;
}
function dragEnd(){
    initialX=currentX;
    initialY=currentY;
    active=false;
}
function drag(e){
    if(active){
        e.preventDefault();
        currentX=(e.touches?e.touches[0].clientX:e.clientX)-initialX;
        currentY=(e.touches?e.touches[0].clientY:e.clientY)-initialY;
        xOffset=currentX;
        yOffset=currentY;
        dragItem.style.transform="translate("+currentX+"px,"+currentY+"px)";
    }
}

<script>
// Vibration kidogo kwenye simu
function vibratePhone(){

// Ficha button ndani ya app
var ua = navigator.userAgent || navigator.vendor;

  document.getElementById("downloadAppBtn").style.display="none";
}

// Fanya button iwe movable

function dragElement(elmnt){
  var bPos1=0,bPos2=0,bPos3=0,bPos4=0;

  elmnt.onmousedown=dragMouseDown;
  elmnt.ontouchstart=dragTouchStart;

  function dragMouseDown(e){
    e=e||window.event;
    e.preventDefault();
    bPos3=e.clientX;
    bPos4=e.clientY;
    document.onmouseup=closeDragElement;
    document.onmousemove=elementDrag;
  }

  function dragTouchStart(e){
    var touch=e.touches[0];
    bPos3=touch.clientX;
    bPos4=touch.clientY;
    document.ontouchend=closeDragElement;
    document.ontouchmove=elementDragTouch;
  }

  function elementDrag(e){
    e=e||window.event;
    e.preventDefault();
    bPos1=bPos3-e.clientX;
    bPos2=bPos4-e.clientY;
    bPos3=e.clientX;
    bPos4=e.clientY;
    elmnt.style.top=(elmnt.offsetTop-bPos2)+"px";
    elmnt.style.left=(elmnt.offsetLeft-bPos1)+"px";
  }

  function elementDragTouch(e){
    var touch=e.touches[0];
    bPos1=bPos3-touch.clientX;
    bPos2=bPos4-touch.clientY;
    bPos3=touch.clientX;
    bPos4=touch.clientY;
    elmnt.style.top=(elmnt.offsetTop-bPos2)+"px";
    elmnt.style.left=(elmnt.offsetLeft-bPos1)+"px";
  }

  function closeDragElement(){
    document.onmouseup=null;
    document.onmousemove=null;
    document.ontouchmove=null;
  }
}
</script>
